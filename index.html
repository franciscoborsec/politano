<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent !important; font-family: sans-serif; }
        #btn-start { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; padding: 15px 35px; background: #2196F3; color: white; 
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <button id="btn-start">INICIAR EXPERIENCIA</button>

    <script>
        // SHADER DE ALTA PRECISIÓN QUE OBLIGA A IGNORAR EL FONDO NEGRO
        AFRAME.registerComponent('chromakey', {
            schema: { 
                color: { type: 'color', default: '#12e310' },
                threshold: { type: 'float', default: 0.5 } // Umbral aumentado para mayor limpieza
            },
            init: function () {
                const videoElement = document.querySelector('#arVideo');
                const texture = new THREE.VideoTexture(videoElement);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                texture.format = THREE.RGBAFormat; // Exige canales de transparencia integrados

                const geometry = new THREE.PlaneGeometry(1.78, 1); // Forzar aspecto panorámico

                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        u_texture: { value: texture },
                        u_color: { value: new THREE.Color(this.data.color) },
                        u_threshold: { value: this.data.threshold }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        precision highp float;
                        varying vec2 vUv;
                        uniform sampler2D u_texture;
                        uniform vec3 u_color;
                        uniform float u_threshold;
                        void main() {
                            vec4 texColor = texture2D(u_texture, vUv);
                            
                            // Distancia euclidiana en el espacio RGB
                            float dist = distance(texColor.rgb, u_color);
                            
                            if (dist < u_threshold) { 
                                discard; // La GPU destruye el píxel verde por completo
                            } else {
                                gl_FragColor = texColor;
                            }
                        }
                    `,
                    transparent: true,
                    depthWrite: false,
                    depthTest: true,
                    blending: THREE.NormalBlending
                });

                const mesh = new THREE.Mesh(geometry, this.material);
                // Aseguramos que la malla no herede opacidad negra de contenedores ocultos
                mesh.material.needsUpdate = true;
                this.el.setObject3D('mesh', mesh);
            }
        });
    </script>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, alpha: true, antialias: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="paint-target" mindar-image-target="targetIndex: 0">
            <a-entity chromakey="color: #12e310; threshold: 0.5" position="0 0 0"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btn-start');
        const video = document.getElementById('arVideo');
        const sceneEl = document.querySelector('a-scene');

        btn.addEventListener('click', () => {
            // Desbloqueo forzado
            video.play().then(() => {
                video.pause(); 
                sceneEl.systems["mindar-image-system"].start();
                btn.style.display = 'none';
            }).catch(err => {
                console.log("Autoplay mitigado:", err);
                sceneEl.systems["mindar-image-system"].start();
                btn.style.display = 'none';
            });
        });

        const targetEl = document.getElementById('paint-target');
        targetEl.addEventListener("targetFound", () => { video.play(); });
        targetEl.addEventListener("targetLost", () => { video.pause(); });
    </script>
</body>
</html>
